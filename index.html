<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For You</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

/* background layers */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  transition: all 1s ease;
  z-index: -2;
}

/* floating hearts */
.heart {
  position: absolute;
  color: rgba(255, 255, 255, 0.7);
  animation: floatUp 6s linear infinite;
  font-size: 18px;
}

@keyframes floatUp {
  from { transform: translateY(100vh) scale(0.8); opacity: 0; }
  50% { opacity: 1; }
  to { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.card {
  max-width: 600px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  transition: transform 0.5s ease;
}

.card:active {
  transform: scale(0.98);
}

h1 {
  margin-bottom: 20px;
  font-size: 22px;
  opacity: 0.9;
}

.text {
  font-size: 18px;
  line-height: 1.6;
  animation: fade 0.8s ease;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

button {
  margin-top: 20px;
  padding: 10px 18px;
  border: none;
  border-radius: 12px;
  background: #ff4d88;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="container">
  <h1>something i never really said properly</h1>

  <div class="card">
    <div class="text" id="text"></div>
    <button onclick="next()">next</button>
  </div>
</div>

<script>
const messages = [
"I like your eyes especially when you laugh cos they twinkle.",
"I like your laugh and the way you talk",
"I love your smile hahaha",
"I like how kind you are toward me, and I’ve never once felt disrespected by you, even in the smallest things. I really hate it when people don’t respect my space and time and it’s okay ra unta with me if ikaw, but you never did.",
"You’re smart and independent? Hahahahaha, I think you’re independent in some ways",
"I like how you make me feel calm. There’s just something about you that’s (pero mangulba jud ko if magkita ta before, pero basin dili na ugka meet nato cos wala lang hahahah)",
"I like how when I start thinking about things that don’t have answers, u were the only one who got curious with me. Like we could talk about life and the universe for hours and I’d never get bored. From no-brainer to philosophical ones.",
"Im so comfortable with you",
"I like you as a person",
"I hope we can talk more and I hope I can see you more",
"I wanna be your friend so bad",
"I hope you know that you can always talk to me about anything, and I wish you’re comfortable enough to do so",
"I hope you achieve all the things you’ve talked about, and the ones that only you know ❤",
"I hope life treats you better.",
"I wish you all the best in life.",
"I hope you don’t settle for less because you’re someone else’s dream.",
"Thank you for everything? Hahahaha idk why pero you’re one of those people who made me want to change for the better. Like fr. Besides my family, it’s you. I don’t know why bro hahahaha like I just want to be better, and believe it or not, you kind of made me better."
];

const gradients = [
"linear-gradient(135deg,#ff9a9e,#fad0c4)",
"linear-gradient(135deg,#ffdde1,#ee9ca7)",
"linear-gradient(135deg,#fbc2eb,#a6c1ee)",
"linear-gradient(135deg,#ff758c,#ff7eb3)",
"linear-gradient(135deg,#fda085,#f6d365)",
"linear-gradient(135deg,#f093fb,#f5576c)",
"linear-gradient(135deg,#ff9a9e,#fecfef)",
"linear-gradient(135deg,#ff6a88,#ff99ac)"
];

let i = 0;

const text = document.getElementById("text");
const bg = document.getElementById("bg");

function setContent() {
  text.style.opacity = 0;
  setTimeout(() => {
    text.innerText = messages[i];
    text.style.opacity = 1;
    bg.style.background = gradients[i % gradients.length];
  }, 200);
}

function next() {
  i = (i + 1) % messages.length;
  setContent();
}

setContent();

/* floating hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "❤";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
